<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Guinea Pig Cleaning | Home Tasks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="/styles.css">
    <script src="/menu.js" defer></script>
    <link rel="icon" type="image/png" href="https://files.dliu.com/dliu.com/favicon.png">
    <meta name="theme-color" content="#40B1FA">
</head>

<body>
    <main class="w3-container page">
        <h1 class="site-title">Home Tasks</h1>
        <site-menu></site-menu>

        <section class="task-panel child-task-panel" data-task="guinea-pigs" aria-labelledby="guinea-pigs-heading">
            <h1 id="guinea-pigs-heading">Guinea pig cleaning</h1>
            <p>Record the time after cleaning the cage and surrounding kitchen area for all six guinea pigs.</p>
            <button class="w3-button w3-blue w3-round" data-action="record" type="button">
                Record 打扫猪猪
            </button>
            <p class="message" data-role="message" role="status" aria-live="polite"></p>

            <section class="status-section" aria-labelledby="guinea-pigs-status-heading">
                <h2 id="guinea-pigs-status-heading">70-hour status</h2>
                <div class="status-card loading" data-role="status">Loading&hellip;</div>
            </section>

            <section aria-labelledby="guinea-pigs-history-heading">
                <div class="history-heading">
                    <h2 id="guinea-pigs-history-heading">Guinea pig cleaning history</h2>
                    <button class="w3-button w3-small w3-light-grey w3-round" data-action="refresh" type="button">
                        Refresh
                    </button>
                </div>
                <p data-role="empty" hidden>No guinea pig cleaning has been recorded yet.</p>
                <ol class="timestamp-list" data-role="history" aria-live="polite"></ol>
            </section>
        </section>
    </main>

    <script src="/app.js"></script>
</body>

</html>
